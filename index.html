<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CapCut → SRT Extractor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="stage">

        <header class="masthead">
            <svg class="mark" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <circle cx="22" cy="22" r="20" stroke="#ffb020" stroke-width="2" />
                <circle cx="22" cy="22" r="3.2" fill="#ffb020" />
                <circle cx="22" cy="8" r="2" fill="#3ddc97" />
                <circle cx="34" cy="16" r="2" fill="#3ddc97" />
                <circle cx="34" cy="28" r="2" fill="#3ddc97" />
                <circle cx="22" cy="36" r="2" fill="#3ddc97" />
                <circle cx="10" cy="28" r="2" fill="#3ddc97" />
                <circle cx="10" cy="16" r="2" fill="#3ddc97" />
            </svg>
            <div class="title-block">
                <p class="eyebrow">CapCut draft → SRT</p>
                <h1>Subtitle Extractor</h1>
            </div>
        </header>

        <main class="deck">

            <section id="dropzone" class="tray" tabindex="0" role="button"
                aria-label="Choose or drop a CapCut draft_content.json file">
                <input type="file" id="jsonFile" accept=".json" class="sr-only" aria-hidden="true" tabindex="-1">
                <div class="reel-pair" aria-hidden="true">
                    <div class="reel" id="reelLeft"></div>
                    <div class="reel" id="reelRight"></div>
                </div>
                <p class="tray-label" id="trayLabel">Drop draft_content.json here</p>
                <p class="tray-sub">or click to browse — nothing leaves your browser</p>
            </section>

            <p id="statusMsg" class="status hidden" role="status"></p>

            <section id="readout" class="readout hidden">
                <div class="counter">
                    <span class="counter-label">PROJECT</span>
                    <span id="projName" class="counter-value">—</span>
                </div>
                <div class="counter">
                    <span class="counter-label">DURATION</span>
                    <span id="projDuration" class="counter-value mono">00:00:00,000</span>
                </div>
                <div class="counter">
                    <span class="counter-label">LINES</span>
                    <span id="projCount" class="counter-value mono">000</span>
                </div>
            </section>

            <section id="timeline" class="timeline hidden">
                <div class="timeline-track" id="timelineTrack"></div>
            </section>

            <section id="preview" class="preview hidden">
                <ol id="previewList" class="preview-list"></ol>
            </section>

            <button id="downloadBtn" class="eject hidden">
                <span class="eject-icon" aria-hidden="true">⏏</span>
                Export .srt
            </button>

        </main>

    </div>

    <script src="script.js" type="module"></script>

</body>

</html>
