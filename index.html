<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CapCut → SRT Extractor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0b0d0e;
            --panel: #14181a;
            --panel-raised: #1b2123;
            --line: #262d30;
            --text: #eef2f1;
            --text-dim: #8a9497;
            --amber: #ffb020;
            --amber-dim: #6b4f1c;
            --mint: #3ddc97;
            --danger: #ff6b5e;
            --font-display: 'Space Grotesk', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --font-body: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
        }

        body {
            display: flex;
            justify-content: center;
            padding: 48px 20px 64px;
            position: relative;
            overflow-x: hidden;
        }

        /* subtle monitor scanline / vignette texture */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background:
                radial-gradient(ellipse at 50% 0%, rgba(255, 255, 255, 0.05), transparent 55%),
                repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.012) 0px, rgba(255, 255, 255, 0.012) 1px, transparent 1px, transparent 3px);
            z-index: 0;
        }

        .stage {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 640px;
        }

        /* ---------- masthead ---------- */
        .masthead {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 28px;
        }

        .mark {
            width: 44px;
            height: 44px;
            flex-shrink: 0;
        }

        .eyebrow {
            margin: 0 0 4px;
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 0.14em;
            color: var(--amber);
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 26px;
            letter-spacing: -0.01em;
        }

        /* ---------- deck ---------- */
        .deck {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 28px;
            display: flex;
            flex-direction: column;
            gap: 22px;
            box-shadow: 0 20px 50px -30px rgba(0, 0, 0, 0.8);
        }

        /* ---------- tray / dropzone ---------- */
        .tray {
            position: relative;
            border: 1.5px dashed var(--line);
            border-radius: 10px;
            padding: 34px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: border-color 0.18s ease, background 0.18s ease;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.015), transparent);
        }

        .tray:hover,
        .tray:focus-visible {
            border-color: var(--amber-dim);
            background: rgba(255, 176, 32, 0.04);
        }

        .tray.drag-over {
            border-color: var(--amber);
            background: rgba(255, 176, 32, 0.08);
        }

        .tray:focus-visible {
            outline: 2px solid var(--amber);
            outline-offset: 3px;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .reel-pair {
            display: flex;
            gap: 22px;
        }

        .reel {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 3px solid var(--line);
            position: relative;
            transition: border-color 0.18s ease;
        }

        .reel::before {
            content: "";
            position: absolute;
            inset: 0;
            margin: auto;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--line);
            transition: background 0.18s ease;
        }

        .reel::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 2px;
            height: 14px;
            background: var(--line);
            transform: translate(-50%, -50%);
            box-shadow:
                rotate(60deg) 0 0;
        }

        .tray:hover .reel,
        .tray.drag-over .reel {
            border-color: var(--amber-dim);
        }

        .tray:hover .reel::before,
        .tray.drag-over .reel::before {
            background: var(--amber);
        }

        .reel.spin {
            animation: spin 0.85s linear infinite;
            border-color: var(--amber);
        }

        .reel.spin::before {
            background: var(--amber);
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .tray-label {
            margin: 0;
            font-family: var(--font-display);
            font-size: 15px;
            font-weight: 600;
        }

        .tray-sub {
            margin: 0;
            font-size: 12.5px;
            color: var(--text-dim);
        }

        /* ---------- readout counters ---------- */
        .readout {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            background: var(--line);
            border: 1px solid var(--line);
            border-radius: 10px;
            overflow: hidden;
        }

        .counter {
            background: var(--panel-raised);
            padding: 14px 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 0;
        }

        .counter-label {
            font-family: var(--font-mono);
            font-size: 10px;
            letter-spacing: 0.1em;
            color: var(--text-dim);
        }

        .counter-value {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .counter-value.mono {
            font-family: var(--font-mono);
            font-variant-numeric: tabular-nums;
            color: var(--amber);
            letter-spacing: 0.01em;
        }

        /* ---------- timeline ---------- */
        .timeline {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .timeline-track {
            position: relative;
            height: 34px;
            background: var(--panel-raised);
            border: 1px solid var(--line);
            border-radius: 6px;
            overflow: hidden;
        }

        .timeline-block {
            position: absolute;
            top: 6px;
            bottom: 6px;
            min-width: 2px;
            background: var(--mint);
            border-radius: 2px;
            opacity: 0.75;
            transition: opacity 0.12s ease, transform 0.12s ease;
            cursor: default;
        }

        .timeline-block:hover {
            opacity: 1;
            transform: scaleY(1.15);
        }

        /* ---------- preview list ---------- */
        .preview {
            max-height: 240px;
            overflow-y: auto;
            border: 1px solid var(--line);
            border-radius: 10px;
            background: var(--panel-raised);
        }

        .preview-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .preview-list li {
            display: flex;
            gap: 14px;
            padding: 10px 14px;
            border-bottom: 1px solid var(--line);
            align-items: baseline;
        }

        .preview-list li:last-child {
            border-bottom: none;
        }

        .row-index {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-dim);
            width: 22px;
            flex-shrink: 0;
            text-align: right;
        }

        .row-time {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--amber);
            flex-shrink: 0;
            white-space: nowrap;
        }

        .row-text {
            font-size: 13px;
            color: var(--text);
            line-height: 1.4;
            overflow-wrap: anywhere;
        }

        /* ---------- status ---------- */
        .status {
            margin: 0;
            font-family: var(--font-mono);
            font-size: 12.5px;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid var(--danger);
            background: rgba(255, 107, 94, 0.08);
            color: var(--danger);
        }

        /* ---------- eject / download button ---------- */
        .eject {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: var(--amber);
            color: #1a1300;
            border: none;
            border-radius: 8px;
            padding: 13px 20px;
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 14.5px;
            letter-spacing: 0.01em;
            cursor: pointer;
            transition: background 0.15s ease, transform 0.06s ease;
        }

        .eject:hover {
            background: #ffc04d;
        }

        .eject:active {
            transform: translateY(1px);
        }

        .eject:focus-visible {
            outline: 2px solid var(--text);
            outline-offset: 3px;
        }

        .eject-icon {
            font-size: 16px;
            line-height: 1;
        }

        /* ---------- utility ---------- */
        .hidden {
            display: none !important;
        }

        .foot {
            margin-top: 22px;
            text-align: center;
        }

        .foot p {
            margin: 0;
            font-size: 12px;
            color: var(--text-dim);
        }

        @media (prefers-reduced-motion: reduce) {
            .reel.spin {
                animation: none;
            }

            .timeline-block,
            .tray {
                transition: none;
            }
        }

        @media (max-width: 480px) {
            .deck {
                padding: 20px;
            }

            .readout {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 22px;
            }
        }
    </style>
</head>

<body>

    <div class="stage">

        <header class="masthead">
            <svg class="mark" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <circle cx="22" cy="22" r="20" stroke="#ffb020" stroke-width="2" />
                <circle cx="22" cy="22" r="3.2" fill="#ffb020" />
                <circle cx="22" cy="8" r="2" fill="#3ddc97" />
                <circle cx="34" cy="16" r="2" fill="#3ddc97" />
                <circle cx="34" cy="28" r="2" fill="#3ddc97" />
                <circle cx="22" cy="36" r="2" fill="#3ddc97" />
                <circle cx="10" cy="28" r="2" fill="#3ddc97" />
                <circle cx="10" cy="16" r="2" fill="#3ddc97" />
            </svg>
            <div class="title-block">
                <p class="eyebrow">CapCut draft → SRT</p>
                <h1>Subtitle Extractor</h1>
            </div>
        </header>

        <main class="deck">

            <section id="dropzone" class="tray" tabindex="0" role="button"
                aria-label="Choose or drop a CapCut draft_content.json file">
                <input type="file" id="jsonFile" accept=".json" class="sr-only" aria-hidden="true" tabindex="-1">
                <div class="reel-pair" aria-hidden="true">
                    <div class="reel" id="reelLeft"></div>
                    <div class="reel" id="reelRight"></div>
                </div>
                <p class="tray-label" id="trayLabel">Drop draft_content.json here</p>
                <p class="tray-sub">or click to browse — nothing leaves your browser</p>
            </section>

            <p id="statusMsg" class="status hidden" role="status"></p>

            <section id="readout" class="readout hidden">
                <div class="counter">
                    <span class="counter-label">PROJECT</span>
                    <span id="projName" class="counter-value">—</span>
                </div>
                <div class="counter">
                    <span class="counter-label">DURATION</span>
                    <span id="projDuration" class="counter-value mono">00:00:00,000</span>
                </div>
                <div class="counter">
                    <span class="counter-label">LINES</span>
                    <span id="projCount" class="counter-value mono">000</span>
                </div>
            </section>

            <section id="timeline" class="timeline hidden">
                <div class="timeline-track" id="timelineTrack"></div>
            </section>

            <section id="preview" class="preview hidden">
                <ol id="previewList" class="preview-list"></ol>
            </section>

            <button id="downloadBtn" class="eject hidden">
                <span class="eject-icon" aria-hidden="true">⏏</span>
                Export .srt
            </button>

        </main>

        <footer class="foot">
            <p>Runs entirely in your browser — nothing is uploaded.</p>
        </footer>

    </div>

    <script>
        (() => {
            const dropzone = document.getElementById('dropzone');
            const fileInput = document.getElementById('jsonFile');
            const trayLabel = document.getElementById('trayLabel');
            const reelLeft = document.getElementById('reelLeft');
            const reelRight = document.getElementById('reelRight');
            const statusMsg = document.getElementById('statusMsg');
            const readout = document.getElementById('readout');
            const projName = document.getElementById('projName');
            const projDuration = document.getElementById('projDuration');
            const projCount = document.getElementById('projCount');
            const timeline = document.getElementById('timeline');
            const timelineTrack = document.getElementById('timelineTrack');
            const preview = document.getElementById('preview');
            const previewList = document.getElementById('previewList');
            const downloadBtn = document.getElementById('downloadBtn');

            let srtContent = '';
            let downloadName = 'subtitles';

            // ---- interaction: click / keyboard / drag ----
            dropzone.addEventListener('click', () => fileInput.click());
            dropzone.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    fileInput.click();
                }
            });
            dropzone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropzone.classList.add('drag-over');
            });
            dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
            dropzone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropzone.classList.remove('drag-over');
                if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
            });
            fileInput.addEventListener('change', () => {
                if (fileInput.files.length) handleFile(fileInput.files[0]);
            });
            downloadBtn.addEventListener('click', triggerDownload);

            function setSpinning(on) {
                reelLeft.classList.toggle('spin', on);
                reelRight.classList.toggle('spin', on);
            }

            function showError(msg) {
                statusMsg.textContent = msg;
                statusMsg.classList.remove('hidden');
                readout.classList.add('hidden');
                timeline.classList.add('hidden');
                preview.classList.add('hidden');
                downloadBtn.classList.add('hidden');
            }

            function clearError() {
                statusMsg.classList.add('hidden');
                statusMsg.textContent = '';
            }

            function handleFile(file) {
                clearError();
                trayLabel.textContent = file.name;
                setSpinning(true);

                const reader = new FileReader();

                reader.onload = (e) => {
                    setTimeout(() => {
                        setSpinning(false);
                        try {
                            processDraft(e.target.result);
                        } catch (err) {
                            showError('Couldn\u2019t read that file: ' + err.message);
                        }
                    }, 320); // brief spin so the reel motion registers on fast parses
                };

                reader.onerror = () => {
                    setSpinning(false);
                    showError('That file couldn\u2019t be read. Try selecting it again.');
                };

                reader.readAsText(file);
            }

            function processDraft(rawText) {
                let data;
                try {
                    data = JSON.parse(rawText);
                } catch {
                    showError('That file doesn\u2019t parse as JSON. Export a draft_content.json from CapCut and try again.');
                    return;
                }

                let name = (data.name || '').trim();
                downloadName = name || ('cursed_draft_' + Math.random().toString(36).substring(2, 10));

                const fragments = data.extra_info?.subtitle_fragment_info_list || [];
                const rows = [];

                for (const fragment of fragments) {
                    const cacheStr = fragment.subtitle_cache_info;
                    if (!cacheStr || !cacheStr.trim()) continue;

                    let cacheInfo;
                    try {
                        cacheInfo = JSON.parse(cacheStr);
                    } catch {
                        continue;
                    }

                    const sentences = cacheInfo.sentence_list || [];
                    if (!sentences.length) continue;
                    const text = sentences.map(s => s.text).filter(Boolean).join('\n');
                    if (!text) continue;

                    rows.push({
                        startMicros: fragment.start_time,
                        endMicros: fragment.end_time,
                        text
                    });
                }

                if (!rows.length) {
                    showError('No subtitle track found in this draft.');
                    return;
                }

                rows.sort((a, b) => a.startMicros - b.startMicros);

                buildSrt(rows);
                renderReadout(name || downloadName, rows);
                renderTimeline(rows);
                renderPreview(rows);
                downloadBtn.classList.remove('hidden');
            }

            function buildSrt(rows) {
                let out = '';
                let counter = 1;
                for (const row of rows) {
                    out += `${counter++}\n${formatTime(row.startMicros)} --> ${formatTime(row.endMicros)}\n${row.text}\n\n`;
                }
                srtContent = out;
            }

            function renderReadout(name, rows) {
                projName.textContent = name;
                projName.title = name;
                const totalMicros = Math.max(...rows.map(r => r.endMicros));
                projDuration.textContent = formatTime(totalMicros);
                projCount.textContent = String(rows.length).padStart(3, '0');
                readout.classList.remove('hidden');
            }

            function renderTimeline(rows) {
                timelineTrack.innerHTML = '';
                const totalMicros = Math.max(...rows.map(r => r.endMicros)) || 1;

                for (const row of rows) {
                    const block = document.createElement('div');
                    block.className = 'timeline-block';
                    const leftPct = (row.startMicros / totalMicros) * 100;
                    const widthPct = Math.max(((row.endMicros - row.startMicros) / totalMicros) * 100, 0.25);
                    block.style.left = leftPct + '%';
                    block.style.width = widthPct + '%';
                    block.title = `${formatTime(row.startMicros)} — ${row.text.slice(0, 80)}`;
                    timelineTrack.appendChild(block);
                }
                timeline.classList.remove('hidden');
            }

            function renderPreview(rows) {
                previewList.innerHTML = '';
                rows.forEach((row, i) => {
                    const li = document.createElement('li');

                    const idx = document.createElement('span');
                    idx.className = 'row-index';
                    idx.textContent = String(i + 1).padStart(2, '0');

                    const time = document.createElement('span');
                    time.className = 'row-time';
                    time.textContent = formatTime(row.startMicros).split(',')[0];

                    const text = document.createElement('span');
                    text.className = 'row-text';
                    text.textContent = row.text;

                    li.append(idx, time, text);
                    previewList.appendChild(li);
                });
                preview.classList.remove('hidden');
            }

            function triggerDownload() {
                if (!srtContent) return;
                const blob = new Blob([srtContent], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${downloadName}.srt`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }

            function formatTime(micros) {
                let millis = Math.floor(micros / 1000);
                const hours = Math.floor(millis / 3600000);
                millis %= 3600000;
                const mins = Math.floor(millis / 60000);
                millis %= 60000;
                const secs = Math.floor(millis / 1000);
                millis %= 1000;

                return `${String(hours).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')},${String(millis).padStart(3, '0')}`;
            }
        })();
    </script>

</body>

</html>
